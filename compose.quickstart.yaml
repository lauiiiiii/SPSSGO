x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    logging: *default-logging
    command:
      - --max_connections=${MYSQL_MAX_CONNECTIONS:-200}
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-data_analysis}
      MYSQL_USER: ${MYSQL_USER:-spssgo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/lauiiiiii/spssgo:latest
    restart: unless-stopped
    logging: *default-logging
    command: >
      sh -c "alembic upgrade head &&
      uvicorn backend.app:app --host 0.0.0.0 --port 8000"
    environment:
      APP_ENV: ${APP_ENV:-production}
      ALLOW_INSECURE_DEV_DEFAULTS: ${ALLOW_INSECURE_DEV_DEFAULTS:-0}
      JOB_BACKEND: ${JOB_BACKEND:-celery}
      DB_AUTO_CREATE: ${DB_AUTO_CREATE:-0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-1}
      METRICS_ENABLED: ${METRICS_ENABLED:-1}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5577,http://127.0.0.1:5577,http://localhost:5578,http://127.0.0.1:5578}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ${MYSQL_USER:-spssgo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-data_analysis}
      MYSQL_POOL_MINSIZE: ${MYSQL_POOL_MINSIZE:-1}
      MYSQL_POOL_MAXSIZE: ${MYSQL_POOL_MAXSIZE:-4}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_STORAGE_ROOT: /var/lib/spssgo/storage
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_KEY_PREFIX: ${S3_KEY_PREFIX:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - storage-data:/var/lib/spssgo/storage

  worker-analysis:
    image: ghcr.io/lauiiiiii/spssgo:latest
    restart: unless-stopped
    logging: *default-logging
    command: >
      celery -A backend.worker_tasks:celery_app worker
      --loglevel=info
      --queues=ingest,process,analysis
      --hostname=analysis@%h
      --concurrency=${ANALYSIS_WORKER_CONCURRENCY:-4}
    environment:
      APP_ENV: ${APP_ENV:-production}
      ALLOW_INSECURE_DEV_DEFAULTS: ${ALLOW_INSECURE_DEV_DEFAULTS:-0}
      JOB_BACKEND: ${JOB_BACKEND:-celery}
      DB_AUTO_CREATE: ${DB_AUTO_CREATE:-0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-1}
      METRICS_ENABLED: ${METRICS_ENABLED:-1}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ${MYSQL_USER:-spssgo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-data_analysis}
      MYSQL_POOL_MINSIZE: ${MYSQL_POOL_MINSIZE:-1}
      MYSQL_POOL_MAXSIZE: ${MYSQL_POOL_MAXSIZE:-4}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_STORAGE_ROOT: /var/lib/spssgo/storage
    depends_on:
      api:
        condition: service_started
    volumes:
      - storage-data:/var/lib/spssgo/storage

  worker-report:
    image: ghcr.io/lauiiiiii/spssgo:latest
    restart: unless-stopped
    logging: *default-logging
    command: >
      celery -A backend.worker_tasks:celery_app worker
      --loglevel=info
      --queues=report
      --hostname=report@%h
      --concurrency=${REPORT_WORKER_CONCURRENCY:-2}
    environment:
      APP_ENV: ${APP_ENV:-production}
      ALLOW_INSECURE_DEV_DEFAULTS: ${ALLOW_INSECURE_DEV_DEFAULTS:-0}
      JOB_BACKEND: ${JOB_BACKEND:-celery}
      DB_AUTO_CREATE: ${DB_AUTO_CREATE:-0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-1}
      METRICS_ENABLED: ${METRICS_ENABLED:-1}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ${MYSQL_USER:-spssgo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-data_analysis}
      MYSQL_POOL_MINSIZE: ${MYSQL_POOL_MINSIZE:-1}
      MYSQL_POOL_MAXSIZE: ${MYSQL_POOL_MAXSIZE:-4}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_STORAGE_ROOT: /var/lib/spssgo/storage
    depends_on:
      api:
        condition: service_started
    volumes:
      - storage-data:/var/lib/spssgo/storage

  worker-ai:
    image: ghcr.io/lauiiiiii/spssgo:latest
    restart: unless-stopped
    logging: *default-logging
    command: >
      celery -A backend.worker_tasks:celery_app worker
      --loglevel=info
      --queues=ai
      --hostname=ai@%h
      --concurrency=${AI_WORKER_CONCURRENCY:-2}
    environment:
      APP_ENV: ${APP_ENV:-production}
      ALLOW_INSECURE_DEV_DEFAULTS: ${ALLOW_INSECURE_DEV_DEFAULTS:-0}
      JOB_BACKEND: ${JOB_BACKEND:-celery}
      DB_AUTO_CREATE: ${DB_AUTO_CREATE:-0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-1}
      METRICS_ENABLED: ${METRICS_ENABLED:-1}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ${MYSQL_USER:-spssgo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-data_analysis}
      MYSQL_POOL_MINSIZE: ${MYSQL_POOL_MINSIZE:-1}
      MYSQL_POOL_MAXSIZE: ${MYSQL_POOL_MAXSIZE:-4}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_STORAGE_ROOT: /var/lib/spssgo/storage
    depends_on:
      api:
        condition: service_started
    volumes:
      - storage-data:/var/lib/spssgo/storage

volumes:
  mysql-data:
  redis-data:
  storage-data:
    name: spssgo-storage-data
